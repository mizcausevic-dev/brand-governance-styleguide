name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site
        shell: pwsh
        run: .\scripts\build.ps1
      - name: Smoke check
        shell: pwsh
        run: .\scripts\smoke_check.ps1
